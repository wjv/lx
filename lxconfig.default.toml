# lx configuration file
# Generated by: lx --init-config
# Documentation: https://github.com/wjv/lx
version = "0.2"

# ── Formats ───────────────────────────────────────────────────────
# A format defines a column layout. Define new custom formats and
# apply with --format=NAME or use in personalities (see below).
#
# These are the compiled-in defaults; override by uncommenting:

# [format.long]
# columns = ["perms", "size", "user", "modified"]

# [format.long2]
# columns = ["perms", "size", "user", "group", "modified", "vcs"]

# [format.long3]
# columns = ["perms", "links", "size", "blocks", "user", "group",
#            "modified", "changed", "created", "accessed", "vcs"]

#   -l   uses format "long"  (tier 1: basic long listing)
#   -ll  uses format "long2" (tier 2: adds group and VCS)
#   -lll uses format "long3" (tier 3: all timestamps and metadata)

# ── Personalities ─────────────────────────────────────────────────
# A personality bundles format, columns, and settings under a name.
# Invoke with --personality=NAME, -p NAME, or via argv[0] symlink.
#
# Every CLI flag has a corresponding config key.  Boolean flags
# take true/false; value flags take a string.  For example:
#   --header           →  header = true
#   --sort=age         →  sort = "age"
#   --time-style=iso   →  time-style = "iso"
#
# Personalities can inherit from each other with `inherits = "NAME"`.
# The child's format/columns override the parent's; settings are
# merged with the child's values winning on conflict.
#
# A common pattern is to define a "default" personality with shared
# settings, then have "lx" and other personalities inherit from it:
#
# ─ default ──┬──→ lx ──┬──→ ll ──┬──→ lt
#             │         │         └──→ la
#             │         └──→ lll
#             └──→ tree
#
# - ls  (standalone — no `inherits`)
#
# These are the compiled-in defaults; override by uncommenting:

# Shared base: settings that apply to all personalities that inherit.
# [personality.default]
# colour = "auto"             # always / auto / never
# colour-scale = "none"       # none / 16 / 256
# time-style = "default"      # default / iso / long-iso / full-iso
# group-dirs = "none"         # first / last / none
# icons = "never"             # always / auto / never
# classify = "never"          # always / auto / never

# The "lx" personality applies when the binary is invoked as "lx".
# [personality.lx]
# inherits = "default"

# [personality.ll]
# inherits = "lx"
# format = "long2"
# vcs-status = true

# [personality.lll]
# inherits = "lx"
# format = "long3"
# header = true
# time-style = "long-iso"

# [personality.tree]
# inherits = "default"
# format = "long2"
# tree = true

# [personality.ls]
# grid = true
# across = true
# (no inherits — standalone, mimics plain ls)

# ── Custom formats ────────────────────────────────────────────────
# Define your own named column layouts as TOML lists or comma-
# separated strings:

# [format.minimal]
# columns = ["perms", "size", "modified"]

# multi-user systems: always show group
# [format.hpc]
# columns = "perms,size,user,group,modified,vcs"

# ── Custom personalities ──────────────────────────────────────────
# Create your own; symlink lx to the name for argv[0] dispatch.
# Use formats or specify columns directly. Optionally inherit
# from builtin and user-defined personalities:

# long listing showing all files, including hidden
# [personality.la]
# inherits = "ll"
# all = true

# time-sorted long listing
# [personality.lt]
# inherits = "ll"
# sort = "age"

# recently modified files
# [personality.recent]
# format = "long"
# sort = "modified"
# reverse = true

# 'du' replacement: tree with dir sizes, largest first
# [personality.du]
# columns = ["size"]
# only-dirs = true
# tree = true
# level = 2
# sort = "size"
# reverse = true
# total-size = true

# ── Theme ─────────────────────────────────────────────────────────
# Colour definitions (not yet implemented).

# [theme]
# di = "38;5;195"
# fi = "38;5;250"
# "*.rs" = "38;5;208"
