# tar = "red"

## ── Filename colour sets ──────────────────────────────────────────
## Named sets of per-filename colours.  Referenced from themes
## via use-filenames = "NAME".

# [filenames.dev]
# Makefile = "bold underline yellow"
# Cargo.toml = "bold #ff8700"
# Dockerfile = "bold deepskyblue"
# README.md = "bold cornflowerblue"
