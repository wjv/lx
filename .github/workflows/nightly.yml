name: Nightly

# Nightly builds: cron-driven daily, recreated atomically as the
# single fixed `nightly` GitHub Release.  Skips the build if HEAD
# hasn't moved since the previous nightly.  workflow_dispatch always
# builds (manual override).  Crates.io publish and Homebrew formula
# updates are NOT triggered — those are stable-channel only.
#
# See `.claude/ci.md` §3.2 for the full design and decisions.

on:
  schedule:
    # Daily at ~01:00 UTC (≈ 02:00 CET / 03:00 CEST; GitHub cron uses
    # UTC without DST adjustment, so the local time drifts by an hour
    # twice a year — fine for "some time around 3am").
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Decide whether to build, validate that Cargo.toml is in trunk
  # -pre.N shape, and capture the previous nightly's commit for the
  # release-body changelog.
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      prev_sha: ${{ steps.decide.outputs.prev_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate trunk version
        # Nightly only ever runs on main.  During release branching
        # (rel/0.N with -rc.N or release versions) this guard never
        # sees those values — no false positives.
        run: |
          VERSION=$(awk '/^\[package\]/{p=1} p && /^version = /{
            gsub(/["[:space:]]/,""); print substr($0,9); exit }' Cargo.toml)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-pre\.[0-9]+$ ]]; then
            echo "::error::Trunk version is '$VERSION', expected '<major>.<minor>.<patch>-pre.<N>'."
            echo "::error::Aborting nightly build to avoid publishing a confusingly-versioned binary."
            exit 1
          fi
          echo "Trunk version OK: $VERSION"

      - name: Decide whether to build
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          echo "HEAD: $HEAD_SHA"

          # First-run case: `gh release view nightly` fails, we build,
          # prev_sha stays empty.
          if PREV_SHA=$(gh release view nightly --json targetCommitish --jq .targetCommitish 2>/dev/null); then
            echo "Previous nightly: $PREV_SHA"
            echo "prev_sha=$PREV_SHA" >> "$GITHUB_OUTPUT"
            if [[ "$HEAD_SHA" == "$PREV_SHA" && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
              echo "HEAD unchanged since last nightly — skipping."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "No existing nightly release found — first run."
          fi
          echo "should_build=true" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    uses: ./.github/workflows/build-binaries.yml
    with:
      ref: main
      nightly: true

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Generate release body
        env:
          PREV_SHA: ${{ needs.check.outputs.prev_sha }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +'%Y-%m-%d')

          {
            echo "**Nightly build**: $DATE, commit [\`$SHORT_SHA\`](https://github.com/wjv/lx/commit/$HEAD_SHA)."
            echo
            echo "Built from the head of \`main\`. Nightlies replace the"
            echo "previous nightly atomically; there is only ever one"
            echo "\`nightly\` release in the list."
            echo

            if [[ -n "$PREV_SHA" ]]; then
              if [[ "$PREV_SHA" == "$HEAD_SHA" ]]; then
                echo "**No new commits since the previous nightly.**  This"
                echo "build was triggered manually via \`workflow_dispatch\`."
              else
                echo "**Changes since the previous nightly:**"
                echo
                git log --oneline "$PREV_SHA..HEAD" | sed 's/^/- /'
              fi
              echo
            fi

            echo "---"
            echo
            echo "[CHANGELOG.md](https://github.com/wjv/lx/blob/$HEAD_SHA/CHANGELOG.md) at this commit."
          } > release-notes.md

          echo "--- release notes ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Replace existing nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the existing nightly release and tag, if any, so
          # the new one starts clean.  --cleanup-tag also removes the
          # underlying tag so it can be force-recreated at HEAD.
          if gh release view nightly >/dev/null 2>&1; then
            gh release delete nightly --cleanup-tag --yes
          fi

          gh release create nightly \
            --prerelease \
            --target main \
            --title "Nightly build" \
            --notes-file release-notes.md \
            lx-* lx.1 lxconfig.toml.5
