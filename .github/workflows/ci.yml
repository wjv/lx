name: CI

on:
  push:
    branches: [main, "rel/**"]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.*"
      - ".github/**"
      - "deny.toml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.*"
      - ".github/**"
      - "deny.toml"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
        include:
          # Also test on our declared MSRV
          - os: ubuntu-latest
            rust: "1.94"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo test --workspace
      # Also test with jj feature enabled
      - run: cargo test --workspace --features jj

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy
      - run: cargo clippy --features jj

  # Licence compliance + security advisories (subsumes cargo-audit).
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Verify it builds without default features (no git, no jj)
  no-default-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --no-default-features

  # Release dress rehearsal — exercises the same build matrix the
  # release workflow uses, by calling the shared build-binaries.yml
  # workflow.  Only runs on release branches.
  release-build:
    if: startsWith(github.ref, 'refs/heads/rel/')
    uses: ./.github/workflows/build-binaries.yml
    with:
      ref: ${{ github.ref }}
