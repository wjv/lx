name: CI

on:
  push:
    branches: [main, "rel/**"]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.*"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
        include:
          # Also test on our declared MSRV
          - os: ubuntu-latest
            rust: "1.94"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo test --workspace
      # Also test with jj feature enabled
      - run: cargo test --workspace --features jj

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy
      - run: cargo clippy --features jj

  # Verify it builds without default features (no git, no jj)
  no-default-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --no-default-features

  # Cross-compile check for aarch64 Linux (catches release build failures)
  cross-aarch64:
    if: startsWith(github.ref, 'refs/heads/rel/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross-compilation tools
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu zlib1g-dev:arm64
      - name: Set cross-linker
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - run: cargo build --release --features jj --target aarch64-unknown-linux-gnu
