name: CI

on:
  push:
    branches: [main, "rel/**"]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.*"
      - ".github/**"
      - "deny.toml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.*"
      - ".github/**"
      - "deny.toml"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
        include:
          # Also test on our declared MSRV
          - os: ubuntu-latest
            rust: "1.94"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo test --workspace
      # Also test with jj feature enabled
      - run: cargo test --workspace --features jj

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy
      - run: cargo clippy --features jj

  # Licence compliance + security advisories (subsumes cargo-audit).
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Verify it builds without default features (no git, no jj)
  no-default-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --no-default-features

  # Release dress rehearsal — mirrors the release workflow's build matrix.
  # Only runs on release branches.
  release-build:
    if: startsWith(github.ref, 'refs/heads/rel/')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          # Pin ALL existing sources to amd64 only so apt doesn't try to
          # fetch arm64 indices from mirrors that don't carry them.
          # Covers: /etc/apt/sources.list, sources.list.d/*.list, and
          # sources.list.d/*.sources (DEB822 format).
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i '/^deb \(http\|https\)/s|^deb |deb [arch=amd64] |' /etc/apt/sources.list
          fi
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i '/^deb \(http\|https\)/s|^deb |deb [arch=amd64] |' "$f" || true
          done
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && grep -q '^Architectures:' "$f" || sudo sed -i '/^Types:/a Architectures: amd64' "$f" || true
          done
          # Add arm64 ports repository.
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe' | sudo tee /etc/apt/sources.list.d/arm64.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe' | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu zlib1g-dev:arm64
      - name: Set cross-linker
        if: matrix.cross
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - run: cargo build --release --features jj --target ${{ matrix.target }}
