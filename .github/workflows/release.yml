name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # Refuse to publish if the tag and Cargo.toml version disagree.
  # Catches "tagged the wrong commit" and "forgot to bump" mistakes
  # before any irreversible publish step (crates.io, Homebrew) runs.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(awk '/^\[package\]/{p=1} p && /^version = /{
            gsub(/["[:space:]]/,""); print substr($0,9); exit }' Cargo.toml)
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match Cargo.toml version '$CARGO_VERSION'."
            echo "::error::Aborting release to avoid publishing a confusingly-versioned binary."
            exit 1
          fi
          echo "Versions match: $TAG_VERSION"

  build:
    needs: validate
    uses: ./.github/workflows/build-binaries.yml
    with:
      ref: ${{ github.ref }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (in_section) exit; if ($0 ~ "\\[" ver "\\]") { in_section = 1; next } }
            in_section && /^### / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "::error::No Highlights section found for version $VERSION in CHANGELOG.md"
            echo "::error::Every release needs a '## [VERSION]' header followed by a '**Highlights:**' block before the '### Added' detail."
            exit 1
          fi

          cat <<EOF >> release-notes.md

          ---

          Full release notes: [CHANGELOG.md](https://github.com/wjv/lx/blob/${GITHUB_REF_NAME}/CHANGELOG.md)

          Migration notes: [UPGRADING.md](https://github.com/wjv/lx/blob/${GITHUB_REF_NAME}/docs/UPGRADING.md)
          EOF

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            lx-*
            lx.1
            lxconfig.toml.5
          body_path: release-notes.md

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_LX_LS }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wjv/homebrew-tap
          token: ${{ secrets.HOMEBREW_LX_LS }}
      - name: Update formula
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/wjv/lx/releases/download/${TAG}"

          # Fetch checksums for release assets.
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            sha=$(curl -sL "${BASE}/lx-${target}" | sha256sum | cut -d' ' -f1)
            eval "SHA_$(echo "$target" | tr '-' '_')=$sha"
          done
          SHA_MAN1=$(curl -sL "${BASE}/lx.1" | sha256sum | cut -d' ' -f1)
          SHA_MAN5=$(curl -sL "${BASE}/lxconfig.toml.5" | sha256sum | cut -d' ' -f1)

          cat > Formula/lx.rb <<RUBY
          class Lx < Formula
            desc "A modern file lister with personality"
            homepage "https://github.com/wjv/lx"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/lx-aarch64-apple-darwin"
                sha256 "${SHA_aarch64_apple_darwin}"
              else
                url "${BASE}/lx-x86_64-apple-darwin"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/lx-aarch64-unknown-linux-gnu"
                sha256 "${SHA_aarch64_unknown_linux_gnu}"
              else
                url "${BASE}/lx-x86_64-unknown-linux-gnu"
                sha256 "${SHA_x86_64_unknown_linux_gnu}"
              end
            end

            resource "man-lx" do
              url "${BASE}/lx.1"
              sha256 "${SHA_MAN1}"
            end

            resource "man-lxconfig" do
              url "${BASE}/lxconfig.toml.5"
              sha256 "${SHA_MAN5}"
            end

            def install
              bin.install Dir["lx-*"].first => "lx"
              chmod 0755, bin/"lx"
              resource("man-lx").stage { man1.install "lx.1" }
              resource("man-lxconfig").stage { man5.install "lxconfig.toml.5" }

              generate_completions_from_executable(bin/"lx", "--completions")
            end

            test do
              assert_match "lx #{version}", shell_output("#{bin}/lx --version")
            end
          end
          RUBY

          # Remove leading whitespace from heredoc.
          sed -i 's/^          //' Formula/lx.rb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lx.rb
          git commit -m "Update lx to ${TAG#v}"
          git push
