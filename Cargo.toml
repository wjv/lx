[package]
name = "lx"
description = "list extended (but call me Alex!)"
authors = ["Benjamin Sago <ogham@bsago.me>", "Johann Visagie <johann@visagie.za.net>"]
categories = ["command-line-utilities"]
edition = "2024"
rust-version = "1.94"
exclude = ["/devtools/*", "/Justfile", "/Vagrantfile", "/screenshots.png"]
readme = "README.md"
license = "MIT"
repository = "https://github.com/wjv/lx"
version = "0.1.0-feat.clap-migration"


[[bin]]
name = "lx"


[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock"] }
glob = "0.3"
libc = "0.2"
locale = "0.2"
log = "0.4"
natord-plus-plus = "2.0"
nu-ansi-term = "0.50"
rayon = "1.10"
terminal_size = "0.4"
uutils_term_grid = "0.7"
unicode-width = "0.2"
unit-prefix = "0.5"
clap = { version = "4.5", features = ["cargo", "derive"] }

[target.'cfg(unix)'.dependencies]
uzers = "0.12"

[dependencies.git2]
version = "0.20"
optional = true
default-features = false

[build-dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock"] }

[features]
default = ["git"]
git = ["git2"]
vendored-openssl = ["git2/vendored-openssl"]


# make dev builds faster by excluding debug symbols
[profile.dev]
debug = false

# use LTO for smaller binaries (that take longer to build)
[profile.release]
lto = true
strip = true
opt-level = 3
codegen-units = 1
panic = 'abort'


[package.metadata.deb]
license-file = ["LICENCE", "4"]
depends = "$auto"
extended-description = """
lx is a modern file lister for UNIX.
"""
section = "utils"
priority = "optional"
assets = [
    ["target/release/lx", "/usr/bin/lx", "0755"],
    ["target/release/../man/lx.1", "/usr/share/man/man1/lx.1", "0644"],
    ["target/release/../man/lx_colors.5", "/usr/share/man/man5/lx_colors.5", "0644"],
    ["completions/bash/lx", "/usr/share/bash-completion/completions/lx", "0644"],
    ["completions/zsh/_lx", "/usr/share/zsh/site-functions/_lx", "0644"],
    ["completions/fish/lx.fish", "/usr/share/fish/vendor_completions.d/lx.fish", "0644"],
]
