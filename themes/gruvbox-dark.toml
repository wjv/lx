# Gruvbox Dark colour theme for lx
# https://github.com/morhetz/gruvbox
#
# Copy to ~/.config/lx/conf.d/ to activate, then use:
#   --theme=gruvbox-dark  or  theme = "gruvbox-dark" in a personality

[theme.gruvbox-dark]
description = "Gruvbox Dark — retro warm palette on dark background"
inherits = "exa"
use-style = "gruvbox-dark"

# UI elements — retro, warm colour palette
directory = "bold #83a598"
symlink = "#8ec07c"
executable = "#b8bb26"
user-you = "#ebdbb2"
user-other = "#665c54"
group-yours = "#83a598"
group-member = "#83a598"
group-other = "#665c54"
uid-you = "#fabd2f"
uid-other = "#665c54"
gid-yours = "#458588"
gid-member = "#458588"
gid-other = "#665c54"

# Size gradient: green → yellow → orange → red → purple
size-number-byte = "#b8bb26"   # green
size-number-kilo = "#fabd2f"   # yellow
size-number-mega = "#fe8019"   # orange
size-number-giga = "#fb4934"   # red
size-number-huge = "#d3869b"   # pink-purple
size-major       = "#ebdbb2"   # fg — flat fallback
size-unit        = "#665c54"   # bg3 — dim, also sets size-minor

# Date gradient: aqua → blue, fading to bg greys
date-now   = "bold #8ec07c"   # aqua, hot
date-today = "#8ec07c"        # aqua
date-week  = "#83a598"        # blue
date-month = "#458588"        # deep blue
date-year  = "#7c6f64"        # bg4 — mid grey
date-old   = "#665c54"        # bg3
date-flat  = "#665c54"        # = old (matches the previous bulk `date`)
permissions-user-read = "#b8bb26"
permissions-user-write = "#fb4934"
permissions-user-execute = "#fabd2f"
permissions-group-read = "#b8bb26"
permissions-group-write = "#fb4934"
permissions-group-execute = "#fabd2f"
permissions-other-read = "#b8bb26"
permissions-other-write = "#fb4934"
permissions-other-execute = "#fabd2f"

[style.gruvbox-dark]
class.image = "#d3869b"
class.video = "#d3869b"
class.music = "#8ec07c"
class.lossless = "#8ec07c"
class.crypto = "#fabd2f"
class.document = "#ebdbb2"
class.compressed = "#fb4934"
class.compiled = "#fe8019"
class.temp = "#665c54"
class.immediate = "bold underline #fabd2f"
