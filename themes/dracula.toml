# Dracula colour theme for lx
# https://draculatheme.com/
#
# Copy to ~/.config/lx/conf.d/ to activate, then use:
#   --theme=dracula  or  theme = "dracula" in a personality

[theme.dracula]
inherits = "exa"
use-style = "dracula"

# UI elements
directory = "bold #bd93f9"
symlink = "#8be9fd"
executable = "#50fa7b"
user-you = "#f8f8f2"
user-other = "#6272a4"
group-yours = "#bd93f9"
group-member = "#bd93f9"
group-other = "#6272a4"
uid-you = "#8be9fd"
uid-other = "#6272a4"
gid-yours = "#ff79c6"
gid-member = "#ff79c6"
gid-other = "#6272a4"

# Size gradient: cyan → green → yellow → orange → red
size-number-byte = "#8be9fd"   # cyan
size-number-kilo = "#50fa7b"   # green
size-number-mega = "#f1fa8c"   # yellow
size-number-giga = "#ffb86c"   # orange
size-number-huge = "#ff5555"   # red
size-major       = "#f8f8f2"   # foreground — flat fallback
size-unit        = "#6272a4"   # comment — dim, also sets size-minor

# Date gradient: cyan → purple, fading to current-line greys
date-now   = "bold #8be9fd"   # cyan, hot
date-today = "#8be9fd"        # cyan
date-week  = "#bd93f9"        # purple
date-month = "#6272a4"        # comment
date-year  = "#525569"        # comment-dim
date-old   = "#44475a"        # current line
date-flat  = "#6272a4"        # = comment (matches the previous bulk `date`)
permissions-user-read = "#50fa7b"
permissions-user-write = "#ff79c6"
permissions-user-execute = "#f1fa8c"
permissions-group-read = "#50fa7b"
permissions-group-write = "#ff79c6"
permissions-group-execute = "#f1fa8c"
permissions-other-read = "#50fa7b"
permissions-other-write = "#ff79c6"
permissions-other-execute = "#f1fa8c"

[style.dracula]
class.image = "#ff79c6"
class.video = "#bd93f9"
class.music = "#8be9fd"
class.lossless = "#8be9fd"
class.crypto = "#f1fa8c"
class.document = "#f8f8f2"
class.compressed = "#ff5555"
class.compiled = "#ffb86c"
class.temp = "#6272a4"
class.immediate = "bold underline #f1fa8c"
