# Gruvbox Light colour theme for lx (light background)
# https://github.com/morhetz/gruvbox
#
# Copy to ~/.config/lx/conf.d/ to activate, then use:
#   --theme=gruvbox-light  or  theme = "gruvbox-light" in a personality

[theme.gruvbox-light]
inherits = "exa"
use-style = "gruvbox-light"

# UI elements — retro, warm palette on light background
directory = "bold #076678"
symlink = "#427b58"
executable = "#79740e"
user-you = "#3c3836"
user-other = "#a89984"
group-yours = "#427b58"
group-member = "#427b58"
group-other = "#a89984"
uid-you = "#b57614"
uid-other = "#a89984"
gid-yours = "#076678"
gid-member = "#076678"
gid-other = "#a89984"

# Size gradient: green → yellow → orange → red → purple
size-number-byte = "#79740e"   # green
size-number-kilo = "#b57614"   # yellow
size-number-mega = "#af3a03"   # orange
size-number-giga = "#9d0006"   # red
size-number-huge = "#8f3f71"   # purple
size-major       = "#3c3836"   # fg — flat fallback
size-unit        = "#a89984"   # bg2-mid — dim, also sets size-minor

# Date gradient: aqua → blue, fading to bg greys
date-now   = "bold #427b58"   # aqua, hot
date-today = "#427b58"        # aqua
date-week  = "#076678"        # blue
date-month = "#458588"        # mid blue
date-year  = "#7c6f64"        # bg4-light grey
date-old   = "#a89984"        # bg3-mid
date-flat  = "#a89984"        # = old (matches the previous bulk `date`)
permissions-user-read = "#79740e"
permissions-user-write = "#9d0006"
permissions-user-execute = "#b57614"
permissions-group-read = "#79740e"
permissions-group-write = "#9d0006"
permissions-group-execute = "#b57614"
permissions-other-read = "#79740e"
permissions-other-write = "#9d0006"
permissions-other-execute = "#b57614"

[style.gruvbox-light]
class.image = "#8f3f71"
class.video = "#8f3f71"
class.music = "#427b58"
class.lossless = "#427b58"
class.crypto = "#b57614"
class.document = "#3c3836"
class.compressed = "#9d0006"
class.compiled = "#af3a03"
class.temp = "#a89984"
class.immediate = "bold underline #b57614"
