# Catppuccin Mocha colour theme for lx
# https://catppuccin.com/
#
# Copy to ~/.config/lx/conf.d/ to activate, then use:
#   --theme=catppuccin-mocha  or  theme = "catppuccin-mocha" in a personality

[theme.catppuccin-mocha]
inherits = "exa"
use-style = "catppuccin-mocha"

# UI elements — warm, soothing pastels on dark background
directory = "bold #89b4fa"
symlink = "#94e2d5"
executable = "#a6e3a1"
user-you = "#cdd6f4"
user-other = "#585b70"
group-yours = "#94e2d5"
group-member = "#94e2d5"
group-other = "#585b70"
uid-you = "#74c7ec"
uid-other = "#585b70"
gid-yours = "#89dceb"
gid-member = "#89dceb"
gid-other = "#585b70"

# Size gradient: green → yellow → peach → maroon → red
size-number-byte = "#a6e3a1"   # green
size-number-kilo = "#f9e2af"   # yellow
size-number-mega = "#fab387"   # peach
size-number-giga = "#eba0ac"   # maroon
size-number-huge = "#f38ba8"   # red
size-major       = "#cdd6f4"   # text — flat fallback
size-unit        = "#585b70"   # surface2 — dim, also sets size-minor

# Date gradient: sky → sapphire → blue, fading to surface greys
date-now   = "bold #89dceb"   # sky, hot
date-today = "#89dceb"        # sky
date-week  = "#74c7ec"        # sapphire
date-month = "#89b4fa"        # blue
date-year  = "#7f849c"        # overlay1
date-old   = "#585b70"        # surface2
date-flat  = "#585b70"        # = old (matches the previous bulk `date`)
permissions-user-read = "#a6e3a1"
permissions-user-write = "#f38ba8"
permissions-user-execute = "#f9e2af"
permissions-group-read = "#a6e3a1"
permissions-group-write = "#f38ba8"
permissions-group-execute = "#f9e2af"
permissions-other-read = "#a6e3a1"
permissions-other-write = "#f38ba8"
permissions-other-execute = "#f9e2af"

[style.catppuccin-mocha]
class.image = "#f5c2e7"
class.video = "#cba6f7"
class.music = "#89dceb"
class.lossless = "#89dceb"
class.crypto = "#f9e2af"
class.document = "#cdd6f4"
class.compressed = "#f38ba8"
class.compiled = "#fab387"
class.temp = "#585b70"
class.immediate = "bold underline #f9e2af"
