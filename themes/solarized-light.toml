# Solarized Light colour theme for lx
# https://ethanschoonover.com/solarized/
#
# Copy to ~/.config/lx/conf.d/ to activate, then use:
#   --theme=solarized-light  or  theme = "solarized-light" in a personality

[theme.solarized-light]
inherits = "exa"
use-style = "solarized-light"

# UI elements — designed for light background
directory = "bold #268bd2"
symlink = "#2aa198"
executable = "#859900"
user-you = "#586e75"
user-other = "#93a1a1"
group-yours = "#2aa198"
group-member = "#2aa198"
group-other = "#93a1a1"
uid-you = "#2aa198"
uid-other = "#93a1a1"
gid-yours = "#268bd2"
gid-member = "#268bd2"
gid-other = "#93a1a1"

# Size gradient: green → yellow → orange → red → magenta
# (same accent palette as Solarized Dark — these read well on
# both backgrounds since they're the canonical Solarized accents)
size-number-byte = "#859900"   # green
size-number-kilo = "#b58900"   # yellow
size-number-mega = "#cb4b16"   # orange
size-number-giga = "#dc322f"   # red
size-number-huge = "#d33682"   # magenta
size-major       = "#586e75"   # base01 — flat fallback (dark on light)
size-unit        = "#93a1a1"   # base1 — dim, also sets size-minor

# Date gradient: cyan → blue → violet, fading to lighter greys
# (on a light bg, "old" fades toward the page colour, not away
# into a void)
date-now   = "bold #2aa198"   # cyan, hot
date-today = "#2aa198"        # cyan
date-week  = "#268bd2"        # blue
date-month = "#6c71c4"        # violet
date-year  = "#839496"        # base0
date-old   = "#93a1a1"        # base1
date-flat  = "#93a1a1"        # = old (matches the previous bulk `date`)
permissions-user-read = "#859900"
permissions-user-write = "#cb4b16"
permissions-user-execute = "#b58900"
permissions-group-read = "#859900"
permissions-group-write = "#cb4b16"
permissions-group-execute = "#b58900"
permissions-other-read = "#859900"
permissions-other-write = "#cb4b16"
permissions-other-execute = "#b58900"

[style.solarized-light]
class.image = "#d33682"
class.video = "#6c71c4"
class.music = "#2aa198"
class.lossless = "#2aa198"
class.crypto = "#b58900"
class.document = "#657b83"
class.compressed = "#dc322f"
class.compiled = "#cb4b16"
class.temp = "#93a1a1"
class.immediate = "bold underline #b58900"
