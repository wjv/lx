# Solarized Light colour theme for lx
# https://ethanschoonover.com/solarized/
#
# Copy to ~/.config/lx/conf.d/ to activate, then use:
#   --theme=solarized-light  or  theme = "solarized-light" in a personality

[theme.solarized-light]
inherits = "exa"
use-style = "solarized-light"

# UI elements — designed for light background
directory = "bold #268bd2"
symlink = "#2aa198"
executable = "#859900"
date = "#93a1a1"
user-you = "#586e75"
user-other = "#93a1a1"
group-yours = "#2aa198"
group-member = "#2aa198"
group-other = "#93a1a1"
uid-you = "#2aa198"
uid-other = "#93a1a1"
gid-yours = "#268bd2"
gid-member = "#268bd2"
gid-other = "#93a1a1"
size-number = "#586e75"
size-unit = "#93a1a1"
permissions-user-read = "#859900"
permissions-user-write = "#cb4b16"
permissions-user-execute = "#b58900"
permissions-group-read = "#859900"
permissions-group-write = "#cb4b16"
permissions-group-execute = "#b58900"
permissions-other-read = "#859900"
permissions-other-write = "#cb4b16"
permissions-other-execute = "#b58900"

[style.solarized-light]
class.image = "#d33682"
class.video = "#6c71c4"
class.music = "#2aa198"
class.lossless = "#2aa198"
class.crypto = "#b58900"
class.document = "#657b83"
class.compressed = "#dc322f"
class.compiled = "#cb4b16"
class.temp = "#93a1a1"
class.immediate = "bold underline #b58900"
